name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Package (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          mkdir -p dist/extract-xiso-gui
          cp build/extract-xiso dist/extract-xiso-gui/ 2>/dev/null || cp build/Release/extract-xiso dist/extract-xiso-gui/ 2>/dev/null || true
          cp -r gui dist/extract-xiso-gui/
          cp install.sh README_GUI.md dist/extract-xiso-gui/
          cd dist && zip -r "../extract-xiso-gui-${OS}.zip" extract-xiso-gui/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist/extract-xiso-gui
          Copy-Item build/Release/extract-xiso.exe dist/extract-xiso-gui/ -ErrorAction SilentlyContinue
          Copy-Item -Recurse gui dist/extract-xiso-gui/
          Copy-Item README_GUI.md dist/extract-xiso-gui/
          Compress-Archive -Path dist/extract-xiso-gui -DestinationPath extract-xiso-gui-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extract-xiso-gui-${{ runner.os }}
          path: "*.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          files: "**/*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
